name: Build and Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: "build"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: "src"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches/modules-2
            ~/.gradle/caches/jars-9
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Purge stale cloudstream stubs JAR
        run: rm -rf ~/.gradle/caches/cloudstream || true

      - name: Build plugins
        working-directory: src
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon --stacktrace make makePluginsJson

      - name: Collect build artefacts
        run: |
          set -euo pipefail
          mkdir -p builds
          find src -type f -name '*.cs3' -exec cp -v {} builds/ \;
          if [ -f src/build/plugins.json ]; then
            cp -v src/build/plugins.json builds/plugins.json
          else
            echo "::error::plugins.json was not produced by makePluginsJson"
            exit 1
          fi
          echo "--- Final artefacts ---"
          ls -la builds/

      - name: Deploy to 'builds' branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./builds
          publish_branch: builds
          force_orphan: true
          commit_message: "Build ${{ github.sha }}"
