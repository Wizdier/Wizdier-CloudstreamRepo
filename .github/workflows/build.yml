# Sample GitHub Actions workflow showing how to pass secrets
# for BuildConfig fields.  Add the following secrets in your
# repository Settings -> Secrets and variables -> Actions:
#
#   TMDB_API          - your TMDB API key
#   FTP_IP_OVERRIDES  - comma-separated domain=ip pairs, e.g.:
#     "index2.circleftp.net=15.1.4.5,index1.circleftp.net=15.1.4.9,..."

name: Build CloudStream Plugin

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        env:
          TMDB_API: ${{ secrets.TMDB_API }}
          FTP_IP_OVERRIDES: ${{ secrets.FTP_IP_OVERRIDES }}
        run: ./gradlew build